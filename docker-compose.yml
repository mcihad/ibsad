services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ibsad
      POSTGRES_USER: ibsad
      POSTGRES_PASSWORD: ibsad
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ibsad -d ibsad"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://ibsad:ibsad@db:5432/ibsad
      JWT_SECRET: ibsad-production-secret-change-me
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
